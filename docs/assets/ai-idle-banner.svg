<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="600" height="150">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F2937;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="150" fill="url(#bgGrad)" rx="8"/>

  <!-- Border -->
  <rect x="2" y="2" width="596" height="146" fill="none" stroke="#374151" stroke-width="2" rx="6"/>

  <!-- Logo icon -->
  <g transform="translate(30, 30)">
    <!-- Background circle -->
    <circle cx="45" cy="45" r="42" fill="#1F2937" stroke="#374151" stroke-width="2"/>

    <!-- Energy bolt -->
    <path d="M42 15 L30 42 L40 42 L35 75 L65 38 L52 38 L60 15 Z"
          fill="url(#greenGrad)"
          stroke="#10B981"
          stroke-width="1"/>

    <!-- AI circuit dots -->
    <circle cx="18" cy="30" r="3" fill="url(#blueGrad)"/>
    <circle cx="72" cy="30" r="3" fill="url(#blueGrad)"/>
    <circle cx="18" cy="60" r="3" fill="url(#blueGrad)"/>
    <circle cx="72" cy="60" r="3" fill="url(#blueGrad)"/>

    <line x1="18" y1="30" x2="30" y2="42" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
    <line x1="72" y1="30" x2="65" y2="38" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
    <line x1="18" y1="60" x2="35" y2="57" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
    <line x1="72" y1="60" x2="52" y2="53" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>

    <!-- Outer ring -->
    <path d="M45 5 A40 40 0 0 1 83 35" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M83 55 A40 40 0 0 1 45 85" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M7 55 A40 40 0 0 1 7 35" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="145" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="#FFFFFF">AI-IDLE</text>
  <text x="145" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#9CA3AF">Intelligent Energy Management Platform</text>

  <!-- Version badge -->
  <rect x="460" y="55" width="110" height="24" rx="12" fill="#10B981" opacity="0.2"/>
  <rect x="460" y="55" width="110" height="24" rx="12" fill="none" stroke="#10B981" stroke-width="1"/>
  <text x="515" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#10B981" text-anchor="middle">v1.8.0</text>

  <!-- Decorative elements -->
  <circle cx="550" cy="120" r="3" fill="#3B82F6" opacity="0.5"/>
  <circle cx="570" cy="110" r="2" fill="#10B981" opacity="0.5"/>
  <circle cx="560" cy="130" r="2" fill="#3B82F6" opacity="0.3"/>
</svg>
