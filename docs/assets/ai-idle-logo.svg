<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#1F2937" stroke="#374151" stroke-width="2"/>

  <!-- Energy bolt -->
  <path d="M55 25 L40 55 L52 55 L45 95 L80 50 L65 50 L75 25 Z"
        fill="url(#grad1)"
        stroke="#10B981"
        stroke-width="1"/>

  <!-- AI circuit lines -->
  <circle cx="30" cy="40" r="4" fill="url(#grad2)"/>
  <circle cx="90" cy="40" r="4" fill="url(#grad2)"/>
  <circle cx="30" cy="80" r="4" fill="url(#grad2)"/>
  <circle cx="90" cy="80" r="4" fill="url(#grad2)"/>

  <line x1="30" y1="40" x2="40" y2="55" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
  <line x1="90" y1="40" x2="80" y2="50" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
  <line x1="30" y1="80" x2="45" y2="75" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>
  <line x1="90" y1="80" x2="65" y2="70" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>

  <!-- Outer ring segments -->
  <path d="M60 8 A52 52 0 0 1 108 45" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
  <path d="M108 75 A52 52 0 0 1 60 112" fill="none" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <path d="M12 75 A52 52 0 0 1 12 45" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
</svg>
